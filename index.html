<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExamTrack – Análise de Laudos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #070d1a;
    --surface: #0e1625;
    --surface2: #141f33;
    --border: #1a2540;
    --accent: #00e5b0;
    --accent2: #0099ff;
    --danger: #ff5a5a;
    --warn: #ffc94d;
    --text: #e8eef8;
    --muted: #4a6080;
    --muted2: #7a90b0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  header {
    display: flex; align-items: center; gap: 14px;
    padding: 18px 24px; border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0a1220 0%, transparent 100%);
    position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px);
  }
  .logo { width: 38px; height: 38px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .logo-text h1 { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; letter-spacing: -.5px; }
  .logo-text p { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .header-actions { margin-left: auto; display: flex; gap: 8px; }

  .btn { border: none; border-radius: 9px; padding: 9px 18px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; transition: all .15s; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #040b16; }
  .btn-primary:hover { opacity: .9; transform: translateY(-1px); }
  .btn-ghost { background: var(--surface2); border: 1px solid var(--border); color: var(--muted2); }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
  .btn-danger { background: #ff5a5a18; border: 1px solid #ff5a5a33; color: var(--danger); }
  .btn-danger:hover { background: #ff5a5a28; }

  main { max-width: 860px; margin: 0 auto; padding: 28px 16px 60px; }

  /* drop zone */
  #drop-zone {
    border: 2px dashed var(--border); border-radius: 20px; padding: 64px 24px;
    text-align: center; cursor: pointer; transition: all .2s; margin-bottom: 28px;
  }
  #drop-zone:hover, #drop-zone.drag-over { border-color: var(--accent); background: #00e5b006; }
  #drop-zone .icon { font-size: 52px; margin-bottom: 16px; }
  #drop-zone h2 { font-family: 'Syne', sans-serif; font-size: 19px; font-weight: 700; margin-bottom: 8px; }
  #drop-zone p { color: var(--muted2); font-size: 14px; }

  /* tabs */
  .tabs { display: flex; gap: 4px; background: var(--surface); border-radius: 12px; padding: 4px; width: fit-content; margin-bottom: 24px; }
  .tab { background: transparent; border: none; color: var(--muted); border-radius: 8px; padding: 8px 20px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; transition: all .15s; display: flex; align-items: center; gap: 8px; }
  .tab.active { background: var(--surface2); color: var(--text); font-weight: 700; }
  .tab .badge { background: var(--surface); color: var(--muted); border-radius: 6px; padding: 1px 8px; font-size: 11px; }
  .tab.active .badge { background: #00e5b018; color: var(--accent); }

  /* loading bar */
  #loading { display: none; background: #00e5b010; border: 1px solid #00e5b030; border-radius: 14px; padding: 18px 22px; margin-bottom: 20px; }
  #loading .load-title { color: var(--accent); font-weight: 600; font-size: 14px; margin-bottom: 6px; }
  #loading .load-sub { color: var(--muted2); font-size: 12px; }
  .pulse { animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  #error-msg { display: none; background: #ff5a5a10; border: 1px solid #ff5a5a30; border-radius: 12px; padding: 12px 18px; color: var(--danger); font-size: 13px; margin-bottom: 16px; }

  /* exam card */
  .exam-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 12px; overflow: hidden; transition: border-color .2s; }
  .exam-card:hover { border-color: #1e3050; }
  .exam-header { display: flex; align-items: center; gap: 12px; padding: 14px 18px; cursor: pointer; }
  .exam-header-info { flex: 1; }
  .exam-header-info .lab { font-weight: 700; font-size: 15px; }
  .exam-header-info .meta { color: var(--muted2); font-size: 12px; margin-top: 3px; }
  .exam-chevron { color: var(--muted); font-size: 16px; transition: transform .2s; }
  .exam-card.open .exam-chevron { transform: rotate(180deg); }
  .exam-body { display: none; border-top: 1px solid var(--border); padding: 0 18px 16px; }
  .exam-card.open .exam-body { display: block; }

  table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 13px; }
  th { color: var(--muted); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; text-align: left; padding: 6px 8px; font-weight: 600; }
  td { padding: 9px 8px; border-top: 1px solid #1a254022; }
  .val { color: var(--accent); font-weight: 700; }

  .badge-status { border-radius: 6px; padding: 2px 10px; font-size: 11px; font-weight: 700; letter-spacing: .5px; }
  .badge-normal { background: #00e5b018; color: var(--accent); border: 1px solid #00e5b030; }
  .badge-alto { background: #ff5a5a18; color: var(--danger); border: 1px solid #ff5a5a30; }
  .badge-baixo { background: #ffc94d18; color: var(--warn); border: 1px solid #ffc94d30; }
  .badge-ind { background: #7a90b018; color: var(--muted2); border: 1px solid #7a90b030; }

  /* charts */
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px 20px 16px; margin-bottom: 16px; }
  .chart-title { display: flex; align-items: baseline; gap: 10px; margin-bottom: 16px; }
  .chart-title .name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; }
  .chart-title .unit { color: var(--muted2); font-size: 12px; }
  .chart-title .ref { color: var(--muted); font-size: 11px; margin-left: auto; }
  .chart-wrap { position: relative; height: 180px; }

  #search-box { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; margin-bottom: 18px; }
  #search-box:focus { border-color: var(--accent); }

  .empty { text-align: center; color: var(--muted2); padding: 48px 0; font-size: 14px; }
  .add-more { border: 1px dashed var(--border); border-radius: 12px; padding: 18px; text-align: center; cursor: pointer; color: var(--muted2); font-size: 13px; transition: all .2s; }
  .add-more:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo">⚕</div>
  <div class="logo-text">
    <h1>ExamTrack</h1>
    <p>Análise de Laudos Médicos</p>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" id="btn-export" style="display:none" onclick="exportCSV()">↓ CSV</button>
    <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">+ PDF</button>
    <input type="file" id="file-input" accept=".pdf" multiple style="display:none">
  </div>
</header>

<main>
  <!-- drop zone -->
  <div id="drop-zone">
    <div class="icon">📄</div>
    <h2>Arraste seus laudos em PDF aqui</h2>
    <p>A IA extrai exames, valores e referências automaticamente</p>
  </div>

  <!-- loading -->
  <div id="loading">
    <div class="load-title pulse">🔍 Analisando laudo com IA…</div>
    <div class="load-sub">Extraindo exames, valores e faixas de referência</div>
  </div>
  <div id="error-msg"></div>

  <!-- tabs (hidden until first exam) -->
  <div id="tabs-container" style="display:none">
    <div class="tabs">
      <button class="tab active" id="tab-exams" onclick="switchTab('exams')">
        📋 Laudos <span class="badge" id="badge-exams">0</span>
      </button>
      <button class="tab" id="tab-charts" onclick="switchTab('charts')">
        📈 Gráficos <span class="badge" id="badge-charts">0</span>
      </button>
    </div>

    <!-- EXAMS panel -->
    <div id="panel-exams">
      <div id="exams-list"></div>
      <div class="add-more" onclick="document.getElementById('file-input').click()">+ Adicionar mais laudos</div>
    </div>

    <!-- CHARTS panel -->
    <div id="panel-charts" style="display:none">
      <input id="search-box" type="text" placeholder="Buscar exame…" oninput="renderCharts()">
      <div id="charts-list"></div>
    </div>
  </div>
</main>

<script>
// ── state ────────────────────────────────────────────────────────────────────
let exams = [];          // [{id, filename, date, lab, patient, results:[]}]
let chartInstances = {}; // name -> Chart instance
let currentTab = 'exams';

// ── file input / drag-drop ────────────────────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', e => handleFiles(e.target.files));

async function handleFiles(files) {
  const pdfs = [...files].filter(f => f.type === 'application/pdf');
  if (!pdfs.length) { showError('Envie apenas arquivos PDF.'); return; }
  hideError();
  for (const file of pdfs) {
    showLoading(true);
    try {
      const b64 = await toBase64(file);
      const result = await analyzeWithClaude(b64, file.name);
      exams.push({ id: Date.now() + Math.random(), filename: file.name, ...result });
      fileInput.value = '';
    } catch (e) {
      showError('Erro ao analisar ' + file.name + ': ' + e.message);
    }
    showLoading(false);
  }
  render();
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('Falha ao ler arquivo'));
    r.readAsDataURL(file);
  });
}

// ── Claude API ────────────────────────────────────────────────────────────────
async function analyzeWithClaude(base64PDF, filename) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: `Você é especialista em análise de laudos médicos.
Extraia os resultados do PDF e retorne APENAS JSON válido, sem markdown, sem texto extra.
Formato:
{
  "date": "YYYY-MM-DD ou null",
  "lab": "nome do laboratório",
  "patient": "nome do paciente ou null",
  "results": [
    {"name":"nome do exame","value":número,"unit":"unidade","refMin":número_ou_null,"refMax":número_ou_null,"status":"normal|alto|baixo|indeterminado"}
  ]
}
Extraia TODOS os exames. Para value, use sempre número quando possível.`,
      messages: [{
        role: 'user',
        content: [
          { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: base64PDF } },
          { type: 'text', text: 'Analise este laudo (' + filename + ') e retorne JSON com todos os exames.' }
        ]
      }]
    })
  });
  if (!res.ok) throw new Error('API retornou ' + res.status);
  const data = await res.json();
  const text = (data.content || []).map(b => b.text || '').join('');
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

// ── render ────────────────────────────────────────────────────────────────────
function render() {
  const hasExams = exams.length > 0;
  dropZone.style.display = hasExams ? 'none' : 'block';
  document.getElementById('tabs-container').style.display = hasExams ? 'block' : 'none';
  document.getElementById('btn-export').style.display = hasExams ? 'inline-block' : 'none';

  document.getElementById('badge-exams').textContent = exams.length;
  renderExamsList();
  renderCharts();
}

function renderExamsList() {
  const list = document.getElementById('exams-list');
  list.innerHTML = '';
  exams.forEach(exam => {
    const card = document.createElement('div');
    card.className = 'exam-card';
    card.innerHTML = `
      <div class="exam-header" onclick="toggleCard(this)">
        <div class="exam-header-info">
          <div class="lab">${exam.lab || 'Laboratório desconhecido'}</div>
          <div class="meta">${fmtDate(exam.date)} · ${(exam.results||[]).length} exames${exam.patient ? ' · ' + exam.patient : ''}</div>
        </div>
        <button class="btn btn-danger" style="font-size:12px;padding:5px 12px" onclick="event.stopPropagation();removeExam('${exam.id}')">Remover</button>
        <span class="exam-chevron">▾</span>
      </div>
      <div class="exam-body">
        <table>
          <thead><tr><th>Exame</th><th>Valor</th><th>Unidade</th><th>Referência</th><th>Status</th></tr></thead>
          <tbody>
            ${(exam.results||[]).map(r => `
              <tr>
                <td>${r.name}</td>
                <td class="val">${r.value}</td>
                <td style="color:var(--muted2)">${r.unit||'—'}</td>
                <td style="color:var(--muted2)">${r.refMin!=null&&r.refMax!=null?r.refMin+' – '+r.refMax:'—'}</td>
                <td>${statusBadge(r.status)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
    list.appendChild(card);
  });
}

function renderCharts() {
  // destroy old charts
  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};

  const search = (document.getElementById('search-box').value||'').toLowerCase();
  const container = document.getElementById('charts-list');
  container.innerHTML = '';

  // build map
  const map = {};
  exams.forEach(exam => {
    (exam.results||[]).forEach(r => {
      const num = parseFloat(r.value);
      if (isNaN(num)) return;
      if (!map[r.name]) map[r.name] = { unit: r.unit, refMin: r.refMin, refMax: r.refMax, data: [] };
      map[r.name].data.push({ date: exam.date, value: num });
    });
  });

  const names = Object.keys(map).filter(n => n.toLowerCase().includes(search));
  document.getElementById('badge-charts').textContent = names.length;

  if (!names.length) {
    container.innerHTML = '<div class="empty">Nenhum exame numérico encontrado.</div>';
    return;
  }

  names.forEach(name => {
    const { unit, refMin, refMax, data } = map[name];
    const sorted = [...data].sort((a,b) => new Date(a.date)-new Date(b.date));

    const card = document.createElement('div');
    card.className = 'chart-card';
    const uid = 'chart-' + name.replace(/\W/g,'_');
    card.innerHTML = `
      <div class="chart-title">
        <span class="name">${name}</span>
        ${unit ? `<span class="unit">${unit}</span>` : ''}
        ${refMin!=null&&refMax!=null ? `<span class="ref">Ref: ${refMin} – ${refMax}</span>` : ''}
      </div>
      <div class="chart-wrap"><canvas id="${uid}"></canvas></div>`;
    container.appendChild(card);

    const ctx = document.getElementById(uid).getContext('2d');
    const labels = sorted.map(d => fmtDate(d.date));
    const values = sorted.map(d => d.value);

    const annotations = {};
    if (refMin != null) annotations.refMin = { type:'line', yMin:refMin, yMax:refMin, borderColor:'rgba(255,201,77,.5)', borderWidth:1.5, borderDash:[5,3] };
    if (refMax != null) annotations.refMax = { type:'line', yMin:refMax, yMax:refMax, borderColor:'rgba(255,90,90,.5)', borderWidth:1.5, borderDash:[5,3] };

    chartInstances[name] = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data: values,
          borderColor: '#00e5b0',
          backgroundColor: ctx2 => {
            const g = ctx2.chart.ctx.createLinearGradient(0,0,0,160);
            g.addColorStop(0,'rgba(0,229,176,.22)');
            g.addColorStop(1,'rgba(0,229,176,0)');
            return g;
          },
          borderWidth: 2.5,
          pointBackgroundColor: '#00e5b0',
          pointRadius: 5,
          pointHoverRadius: 7,
          tension: 0.3,
          fill: true,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#0e1625',
            borderColor: '#1a2540',
            borderWidth: 1,
            titleColor: '#4a6080',
            bodyColor: '#00e5b0',
            bodyFont: { weight: 'bold', size: 14 },
            callbacks: { label: ctx => ctx.raw + (unit ? ' ' + unit : '') }
          }
        },
        scales: {
          x: { grid: { color: '#1a254028' }, ticks: { color: '#4a6080', font: { size: 11 } } },
          y: { grid: { color: '#1a254028' }, ticks: { color: '#4a6080', font: { size: 11 } } }
        }
      }
    });
  });
}

// ── utils ─────────────────────────────────────────────────────────────────────
function toggleCard(header) {
  header.parentElement.classList.toggle('open');
}
function removeExam(id) {
  exams = exams.filter(e => String(e.id) !== String(id));
  render();
}
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-exams').classList.toggle('active', tab==='exams');
  document.getElementById('tab-charts').classList.toggle('active', tab==='charts');
  document.getElementById('panel-exams').style.display = tab==='exams' ? 'block' : 'none';
  document.getElementById('panel-charts').style.display = tab==='charts' ? 'block' : 'none';
  if (tab === 'charts') renderCharts();
}
function fmtDate(str) {
  if (!str) return '—';
  const d = new Date(str);
  return isNaN(d) ? str : d.toLocaleDateString('pt-BR');
}
function statusBadge(s) {
  const map = { normal:['badge-normal','Normal'], alto:['badge-alto','Alto'], baixo:['badge-baixo','Baixo'] };
  const [cls,label] = map[s] || ['badge-ind','?'];
  return `<span class="badge-status ${cls}">${label}</span>`;
}
function showLoading(v) { document.getElementById('loading').style.display = v ? 'block' : 'none'; }
function showError(msg) { const el = document.getElementById('error-msg'); el.textContent = '⚠ ' + msg; el.style.display = 'block'; }
function hideError() { document.getElementById('error-msg').style.display = 'none'; }

function exportCSV() {
  const rows = [['Exame','Data','Valor','Unidade','Ref Min','Ref Max']];
  exams.forEach(e => (e.results||[]).forEach(r => rows.push([r.name, e.date, r.value, r.unit||'', r.refMin??'', r.refMax??''])));
  const csv = rows.map(r => r.map(c => '"'+c+'"').join(',')).join('\n');
  const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download = 'exames.csv'; a.click();
}
</script>
</body>
</html>
